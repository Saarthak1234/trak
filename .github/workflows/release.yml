name: Build/Release muStream

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build & Release on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            build_cmd: npm run build:mac
            artifact_glob: "dist_app/*.dmg\ndist_app/*.zip"
          - os: ubuntu-latest
            build_cmd: npm run build:linux
            artifact_glob: "dist_app/*.AppImage\ndist_app/*.deb"
          - os: windows-latest
            build_cmd: npm run build:win
            artifact_glob: "dist_app/*.exe"

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Linux Build Dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3 libudev-dev libsecret-1-dev

      - name: Bundle Windows Dependencies (mpv + yt-dlp)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "vendor\win" | Out-Null

          # Download yt-dlp.exe (single portable executable)
          Write-Host "Downloading yt-dlp.exe..."
          Invoke-WebRequest -Uri "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe" -OutFile "vendor\win\yt-dlp.exe" -UseBasicParsing

          # Download mpv via Chocolatey (pre-installed on GitHub Actions Windows runners)
          Write-Host "Installing mpv via Chocolatey..."
          choco install mpv -y --no-progress

          # Choco does NOT refresh PATH in the current session — search the lib dir directly
          $mpvExe = Get-ChildItem "C:\ProgramData\chocolatey\lib" -Filter "mpv.exe" -Recurse -ErrorAction SilentlyContinue |
                    Where-Object { $_.FullName -notlike "*shim*" } |
                    Select-Object -First 1

          if ($mpvExe) {
            Write-Host "Found mpv.exe at: $($mpvExe.FullName)"
            Copy-Item $mpvExe.FullName "vendor\win\mpv.exe"
          } else {
            Write-Error "mpv.exe not found in Chocolatey lib after install"
            exit 1
          }

          Write-Host "Bundled binaries:"
          Get-ChildItem vendor\win

      - name: Install Dependencies
        run: npm install

      - name: Rebuild native modules for Electron
        run: npx @electron/rebuild
        shell: bash

      - name: Build App
        run: ${{ matrix.build_cmd }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact_glob }}
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false
          prerelease: false
