name: Build/Release muStream

on:
  push:
    tags:
      - 'v*' # Trigger workflow when a version tag is pushed (e.g. v1.1.0)

permissions:
  contents: write # Needed to create GitHub Releases

jobs:
  release:
    name: Build & Release on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false # Don't cancel Windows/Linux if Mac fails
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install

      # Linux requires additional dependencies to build native modules like node-pty
      - name: Install Linux Build Dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3

      - name: Build and Publish Release
        env:
          # This token is automatically provided by GitHub Actions
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ matrix.os }}" = "macos-latest" ]; then
            npm run build:mac -- --publish always
          elif [ "${{ matrix.os }}" = "windows-latest" ]; then
            npm run build:win -- --publish always
          else
            npm run build:linux -- --publish always
          fi
        shell: bash
