<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Spotify Credentials</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color-rgb: 15, 15, 15;
      --accent: #39ff14;
    }
    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 0;
      color: rgba(255, 255, 255, 0.9);
      background: transparent;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    .wrapper {
      background: rgba(var(--bg-color-rgb), 0.95);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      flex: 1;
      display: flex;
      flex-direction: column;
      margin: 0;
    }
    .titlebar {
      -webkit-app-region: drag;
      padding: 16px;
      display: flex;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .titlebar h3 { margin: 0; font-size: 14px; font-weight: 600; }
    .content {
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .input-group label {
      display: block;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      color: white;
      padding: 10px;
      font-size: 13px;
      font-family: inherit;
      outline: none;
      box-sizing: border-box;
      transition: border-color 0.2s;
    }
    input:focus { border-color: var(--accent); }
    .btn {
      background: var(--accent);
      color: black;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      margin-top: 8px;
    }
    .btn:hover { filter: brightness(1.1); }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="titlebar">
      <h3>Spotify Credentials</h3>
      <button id="closeBtn" style="background: none; border: none; color: white; cursor: pointer; opacity: 0.5; -webkit-app-region: no-drag;">✕</button>
    </div>
    <div class="content">
      <div class="input-group">
        <label>Client ID</label>
        <input type="text" id="clientId" placeholder="Enter your Spotify Client ID" />
      </div>
      <div class="input-group">
        <label>Client Secret</label>
        <input type="password" id="clientSecret" placeholder="Enter your Spotify Client Secret" />
      </div>
      <button class="btn" id="saveBtn">Save Credentials</button>
    </div>
  </div>

  <script>
    window.addEventListener('DOMContentLoaded', async () => {
      const creds = await window.api.getSpotifyCreds()
      if (creds) {
        if (creds.clientId) document.getElementById('clientId').value = creds.clientId
        if (creds.clientSecret) document.getElementById('clientSecret').value = creds.clientSecret
      }
    })

    document.getElementById('closeBtn').addEventListener('click', () => {
      window.api.closeCredentialsWindow()
    })

    document.getElementById('saveBtn').addEventListener('click', () => {
      const id = document.getElementById('clientId').value.trim()
      const secret = document.getElementById('clientSecret').value.trim()
      if (id && secret) {
        window.api.saveSpotifyCreds(id, secret)
      }
    })
  </script>
</body>
</html>
